name: Keep Render Alive

on:
  schedule:
    # Runs every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render App
        run: |
          # Replace this URL with your actual Render URL!
          curl -sS https://tubefetcher.onrender.com > /dev/null
          echo "Pinged Render app successfully to prevent sleep."
